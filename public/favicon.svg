<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Book icon -->
  <defs>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Book cover -->
  <path d="M 16 12 L 32 10 L 48 12 L 48 48 L 32 50 L 16 48 Z" fill="url(#bookGradient)" stroke="#991b1b" stroke-width="1.5"/>
  
  <!-- Book spine -->
  <path d="M 32 10 L 32 50" stroke="#991b1b" stroke-width="2"/>
  
  <!-- Pages detail -->
  <line x1="20" y1="20" x2="45" y2="22" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="28" x2="45" y2="30" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="36" x2="45" y2="38" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Star on cover -->
  <circle cx="32" cy="28" r="6" fill="#fbbf24"/>
  <path d="M 32 25 L 34 31 L 40 31 L 35 35 L 37 41 L 32 37 L 27 41 L 29 35 L 24 31 L 30 31 Z" fill="#fbbf24"/>
</svg>
